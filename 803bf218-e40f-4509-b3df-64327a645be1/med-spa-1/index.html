<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-cream: #f4f0ea;
  --text-black: #1a1a1a;
  --border-black: #1a1a1a;
  --placeholder-gray: rgba(26, 26, 26, 0.3);
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-mono: 'Space Mono', 'Courier New', monospace;
  --space-xs: 0.5rem;
  --space-sm: 1rem;
  --space-md: 2rem;
  --space-lg: 4rem;
  --space-xl: 6rem;
  --space-xxl: 10rem;
  --pad-x: 1.5rem;
}

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background-color: var(--bg-cream);
  color: var(--text-black);
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

a {
  color: inherit;
  text-decoration: none;
}

/* Navigation */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  padding: var(--space-md) var(--pad-x);
  display: flex;
  justify-content: space-between;
  align-items: center;
  mix-blend-mode: difference;
}

.nav-logo {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 400;
  text-transform: lowercase;
  letter-spacing: 0.08em;
  color: #ffffff;
}

.nav-links {
  display: flex;
  gap: var(--space-md);
  list-style: none;
}

.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 400;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  color: #ffffff;
  position: relative;
  padding-bottom: 2px;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 1px;
  background-color: #ffffff;
  transition: width 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.nav-links a:hover::after {
  width: 100%;
}

/* Hero Section */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--space-xl) var(--pad-x);
}

.hero-headline {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: clamp(2.2rem, 7vw, 5rem);
  line-height: 1.1;
  letter-spacing: 0.03em;
  margin-bottom: var(--space-lg);
  opacity: 0;
  transform: translateY(30px);
  animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.3s forwards;
}

.hero-subtitle {
  font-family: var(--font-mono);
  font-size: clamp(0.6rem, 1.2vw, 0.75rem);
  font-weight: 400;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  line-height: 1.8;
  max-width: 480px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.8s forwards;
}

/* Section Styles */
.section {
  padding: var(--space-xl) var(--pad-x);
  border-top: 1px solid var(--border-black);
}

.section-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 400;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-lg);
}

.section-content {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  line-height: 1.8;
  max-width: 800px;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Footer */
.footer {
  border-top: 1px solid var(--border-black);
  padding: var(--space-md) var(--pad-x);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.footer-left,
.footer-right {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 400;
  text-transform: lowercase;
  letter-spacing: 0.03em;
}

.footer-right {
  display: flex;
  gap: var(--space-md);
  flex-wrap: wrap;
}

/* Mobile breakpoint */
@media (max-width: 768px) {
  :root {
    --pad-x: 1rem;
  }

  .nav {
    padding: var(--space-sm) var(--pad-x);
  }

  .nav-links {
    gap: var(--space-sm);
  }

  .nav-links a {
    font-size: 0.65rem;
  }

  .hero {
    padding: var(--space-md) var(--pad-x);
  }

  .hero-headline {
    font-size: clamp(1.8rem, 8vw, 2.5rem);
  }

  .hero-subtitle {
    font-size: 0.6rem;
  }

  .footer-right {
    flex-direction: column;
    gap: var(--space-xs);
  }
}

/* Tablet breakpoint */
@media (min-width: 768px) {
  :root {
    --pad-x: 3rem;
  }

  .footer {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
}

/* Desktop breakpoint */
@media (min-width: 1024px) {
  :root {
    --pad-x: 4rem;
  }

  .nav-links {
    gap: var(--space-lg);
  }
}

/* Large desktop */
@media (min-width: 1440px) {
  .hero-headline {
    font-size: 5.5rem;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<nav class="nav">
  <a href="#" class="nav-logo">elegant-aesthetics.com</a>
  <ul class="nav-links">
    <li><a href="#hero">home</a></li>
    <li><a href="#services">services</a></li>
    <li><a href="#team">team</a></li>
    <li><a href="#contact">contact</a></li>
  </ul>
</nav>

<!-- Hero Section -->
<section id="hero" class="hero">
  <h1 class="hero-headline">Elegant<br>Aesthetics</h1>
  <p class="hero-subtitle">001 — crafting beauty through thoughtful design and refined aesthetics</p>
</section>

<!-- Services Section -->
<section id="services" class="section">
  <h2 class="section-title">services</h2>
  <div class="section-content">
    <!-- Services content would go here when available -->
  </div>
</section>

<!-- Team Section -->
<section id="team" class="section">
  <h2 class="section-title">team</h2>
  <div class="section-content">
    <!-- Team content would go here when available -->
  </div>
</section>

<!-- Contact Section -->
<section id="contact" class="section">
  <h2 class="section-title">contact</h2>
  <div class="section-content">
    <!-- Contact content would go here when available -->
  </div>
</section>

<footer class="footer">
  <div class="footer-left">© 2024 elegant-aesthetics.com</div>
  <div class="footer-right">
    <span>zurich</span>
    <span>copenhagen</span>
    <span>tokyo</span>
  </div>
</footer>

</body>
</html>
