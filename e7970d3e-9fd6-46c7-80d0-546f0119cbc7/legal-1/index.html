<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<style>
:root {
  --bg-primary: #111115;
  --bg-secondary: #1a1a20;
  --bg-hover: #22222a;
  --bg-card: #16161c;
  --text-primary: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.5);
  --text-dim: rgba(255, 255, 255, 0.35);
  --border-color: rgba(255, 255, 255, 0.1);
  --border-light: rgba(255, 255, 255, 0.06);
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --sidebar-width: 280px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 32px;
  --space-xl: 48px;
  --space-2xl: 64px;
  --space-3xl: 96px;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

/* Mobile header */
.mobile-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-primary);
}

.mobile-header .brand {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  text-decoration: none;
  color: var(--text-primary);
}

.mobile-header .brand .globe-icon {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--text-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.mobile-header .brand-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-sm);
}

.hamburger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--text-primary);
  transition: all 0.3s ease;
}

/* Sidebar */
.sidebar {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--bg-primary);
  border-right: 1px solid var(--border-color);
  z-index: 200;
  flex-direction: column;
  justify-content: space-between;
  padding: var(--space-xl) var(--space-lg);
  overflow-y: auto;
}

.sidebar .brand-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-xl);
}

.sidebar .brand-link {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--text-primary);
}

.sidebar .globe-icon {
  width: 38px;
  height: 38px;
  border: 1.5px solid var(--text-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.sidebar .brand-name {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.sidebar nav {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.sidebar nav a {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.sidebar nav a:hover {
  color: var(--text-primary);
}

.sidebar .status-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-primary);
  flex-shrink: 0;
}

.status-label {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* Main content area */
.main-content {
  width: 100%;
  min-height: 100vh;
}

/* Hero Section */
.hero {
  border-bottom: 1px solid var(--border-color);
  padding: var(--space-xl) var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-xl);
}

.hero-text {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
  max-width: 700px;
}

.hero-label {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.hero-headline {
  font-family: var(--font-serif);
  font-size: clamp(36px, 8vw, 48px);
  font-weight: 400;
  line-height: 1.05;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.hero-subheading {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(16px, 2.5vw, 20px);
  font-weight: 400;
  line-height: 1.5;
  color: var(--text-muted);
  max-width: 520px;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 14px 32px;
  border: 1px solid var(--text-primary);
  border-radius: 50px;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease;
  width: fit-content;
}

.hero-cta:hover {
  background: var(--text-primary);
  color: var(--bg-primary);
}

/* Visual Demo */
.hero-visual {
  width: 100%;
  max-width: 400px;
}

.scan-container {
  background: var(--bg-card);
  border-radius: 16px;
  padding: var(--space-xl);
  position: relative;
  overflow: hidden;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
}

.id-card {
  width: 200px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: var(--space-lg) var(--space-md);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-md);
  position: relative;
  z-index: 2;
}

.id-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 1.5px solid var(--border-color);
  background: var(--bg-hover);
  display: flex;
  align-items: center;
  justify-content: center;
}

.id-avatar i {
  font-size: 20px;
  color: var(--text-dim);
}

.id-text-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
}

.id-text-line {
  height: 6px;
  border-radius: 3px;
  background: var(--border-color);
}

.id-text-line.long { width: 80%; }
.id-text-line.medium { width: 60%; }
.id-text-line.short { width: 40%; }

.id-chip {
  width: 28px;
  height: 20px;
  border-radius: 4px;
  border: 1px solid var(--border-color);
  background: var(--bg-hover);
  margin-top: var(--space-sm);
}

.scan-line {
  position: absolute;
  left: 10%;
  width: 80%;
  height: 2px;
  background: rgba(255, 255, 255, 0.6);
  box-shadow: 0 0 20px 4px rgba(255, 255, 255, 0.15), 0 0 60px 10px rgba(255, 255, 255, 0.05);
  z-index: 3;
  animation: scanMove 3s ease-in-out infinite;
}

@keyframes scanMove {
  0% { top: 10%; }
  50% { top: 85%; }
  100% { top: 10%; }
}

/* Features Grid */
.features {
  border-bottom: 1px solid var(--border-color);
  display: grid;
  grid-template-columns: 1fr;
}

.feature-card {
  padding: var(--space-xl) var(--space-lg);
  border-bottom: 1px solid var(--border-color);
  transition: background-color 0.3s ease;
  cursor: default;
}

.feature-card:last-child {
  border-bottom: none;
}

.feature-card:hover {
  background-color: var(--bg-hover);
}

.feature-protocol {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: var(--space-lg);
}

.feature-title {
  font-family: var(--font-serif);
  font-size: clamp(22px, 3vw, 28px);
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
  margin-bottom: var(--space-md);
}

.feature-description {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-muted);
  max-width: 380px;
}

/* Error Section */
.error-section {
  border-bottom: 1px solid var(--border-color);
  padding: var(--space-2xl) var(--space-lg);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-lg);
}

.error-number {
  font-family: var(--font-serif);
  font-size: clamp(64px, 15vw, 120px);
  font-weight: 400;
  line-height: 1;
  color: var(--text-primary);
}

.error-message {
  font-family: var(--font-serif);
  font-size: clamp(22px, 3vw, 28px);
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
}

.error-description {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-muted);
  max-width: 400px;
}

/* Footer */
.footer {
  padding: var(--space-xl) var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.footer-brand {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.footer-brand-name {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.footer-copyright {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 300;
  color: var(--text-dim);
}

.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-md) var(--space-lg);
}

.footer-links a {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.footer-links a:hover {
  color: var(--text-primary);
}

/* Mobile nav overlay */
.mobile-nav-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 150;
}

.mobile-nav-overlay.active {
  display: block;
}

.sidebar.active {
  display: flex;
}

/* Mobile styles */
@media (max-width: 768px) {
  .mobile-header .brand-name {
    font-size: 12px;
  }
  
  .hamburger {
    padding: var(--space-xs);
  }
  
  .hamburger span {
    width: 18px;
  }
  
  .sidebar {
    width: calc(100% - 40px);
    max-width: 320px;
  }
  
  .error-section {
    padding: var(--space-xl) var(--space-md);
  }
  
  .footer {
    padding: var(--space-lg) var(--space-md);
  }
}

/* =================== TABLET (768px+) =================== */
@media (min-width: 768px) {
  .error-section {
    padding: var(--space-3xl) var(--space-xl);
  }

  .footer {
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-end;
  }
}

/* =================== DESKTOP (1024px+) =================== */
@media (min-width: 1024px) {
  .mobile-header {
    display: none;
  }

  .sidebar {
    display: flex !important;
  }

  .mobile-nav-overlay {
    display: none !important;
  }

  .main-content {
    margin-left: var(--sidebar-width);
    width: calc(100% - var(--sidebar-width));
  }

  .error-section {
    padding: var(--space-3xl) var(--space-2xl);
  }

  .footer {
    padding: var(--space-xl) var(--space-2xl);
  }
}

/* =================== LARGE DESKTOP (1440px+) =================== */
@media (min-width: 1440px) {
  .error-section {
    padding: var(--space-3xl) var(--space-3xl);
  }
}
</style>
</head>
<body>

<!-- Mobile Header -->
<header class="mobile-header">
  <a href="#" class="brand">
    <div class="globe-icon"><i class="fas fa-globe"></i></div>
    <span class="brand-name">CT Easley Law</span>
  </a>
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- Mobile Nav Overlay -->
<div class="mobile-nav-overlay" id="navOverlay"></div>

<!-- Sidebar Navigation -->
<aside class="sidebar" id="sidebar">
  <div class="brand-section">
    <a href="#" class="brand-link">
      <div class="globe-icon"><i class="fas fa-globe"></i></div>
      <span class="brand-name">CT Easley Law</span>
    </a>
    <nav>
      <a href="#">Platform</a>
      <a href="#">Solutions</a>
      <a href="#">Documentation</a>
      <a href="#">Enterprise</a>
    </nav>
  </div>
  <div class="status-section">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-label">All Systems Operational</span>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-label">API v4.2 Active</span>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main-content">

  <!-- Error Section -->
  <section class="error-section">
    <div class="error-number">404</div>
    <h1 class="error-message">File not found (404 error)</h1>
    <p class="error-description">If you think what you're looking for should be here, please contact the site owner.</p>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-brand">
      <span class="footer-brand-name">CT Easley Law</span>
      <span class="footer-copyright">© 2024 CT Easley Law Systems, Inc. All rights reserved.</span>
    </div>
    <div class="footer-links">
    </div>
  </footer>

</main>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const sidebar = document.getElementById('sidebar');
  const navOverlay = document.getElementById('navOverlay');

  hamburgerBtn.addEventListener('click', function() {
    sidebar.classList.toggle('active');
    navOverlay.classList.toggle('active');
  });

  navOverlay.addEventListener('click', function() {
    sidebar.classList.remove('active');
    navOverlay.classList.remove('active');
  });

  // Close sidebar on resize to desktop
  window.addEventListener('resize', function() {
    if (window.innerWidth >= 1024) {
      sidebar.classList.remove('active');
      navOverlay.classList.remove('active');
    }
  });
</script>

</body>
</html>
